# CONFIG_BT_LL_SW_LLCP_LEGACY=y

# CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9
# CONFIG_BT_PERIPHERAL_PREF_LATENCY=16
# CONFIG_BT_BUF_ACL_TX_COUNT=32
# CONFIG_BT_L2CAP_TX_BUF_COUNT=32


CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

CONFIG_BT_CTLR_PHY_2M=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_SPI=y
# 激活 GC9A01 原生驱动
CONFIG_GC9A01=y
# 开启 ZMK 的屏幕显示功
CONFIG_ZMK_DISPLAY=y
# 配置 LVGL 渲染参数 (ZMK 底层使用 LVGL 绘制图形)
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_16=y
# 增大内存池以处理 240x240 的渲染
CONFIG_LV_Z_MEM_POOL_SIZE=16384
CONFIG_LV_Z_VDB_SIZE=64
# 开启自定义状态栏（我们将编写这个 UI）
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# 启用键盘RGB功能
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
# CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
# CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3

CONFIG_ZMK_KEYBOARD_NAME="V&Z-Z Fold"




